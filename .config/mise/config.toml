[tools]
elixir = "1.20"
erlang = "29"
node = "24"
python = "3.14"
awscli = { version = "latest", symlink_bins = "true" }
cargo-binstall = "latest"
claude-code = "latest"
gcloud = "latest"
lychee = "latest"
ollama = "latest"
rumdl = "latest"
rust = "latest"
shellcheck = "latest"
shfmt = "latest"
"npm:ccusage" = "latest"
"npm:diff2html-cli" = "latest"
"pipx:basic-memory" = "latest"

[env]
ERL_AFLAGS = "-kernel shell_history enabled"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python", "ruby"]
