version: 2
updates:
  # npm dependencies of the md-to-docx skill
  - package-ecosystem: "npm"
    directory: "/.claude/skills/md-to-docx"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions used by the CI workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
