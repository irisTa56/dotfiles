name: CI

on:
  # No path filter: this check is a required status check on main, so it must
  # report on every PR (a check that never runs would block merges forever).
  pull_request:
  push:
    branches: [main]

# Dependabot PRs run with a read-only token; this job needs nothing more.
permissions:
  contents: read

jobs:
  md-to-docx:
    name: md-to-docx smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .claude/skills/md-to-docx
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: .claude/skills/md-to-docx/package-lock.json

      - run: npm ci

      - run: npm test
