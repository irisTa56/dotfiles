[tools]
gitleaks = "latest"
lychee = "latest"
rumdl = "latest"
shellcheck = "latest"
shfmt = "latest"
"pipx:apm-cli" = "latest"

[env]
HOMEBREW_BUNDLE_DUMP_NO_NPM = "1"
HOMEBREW_BUNDLE_DUMP_NO_VSCODE = "1"

[hooks]
postinstall = '''
hook="$(git rev-parse --git-path hooks/pre-commit)"
test -f "$hook" || { printf '#!/bin/sh\nmise run pre-commit\n' > "$hook" && chmod +x "$hook"; }
'''

[tasks.pre-commit]
description = "Run pre-commit checks"
run = '''
gitleaks protect -v --staged
lychee .
rumdl check
shellcheck scripts/*.sh
shfmt -i 2 -d scripts/*.sh
'''

[tasks."setup:dotfiles"]
description = "Run initial dotfiles setup (dircolors, gitignore, zprofile, zshenv)"
run = "scripts/setup_dotfiles.sh"

[tasks.link-check]
description = "Check if links are valid, showing redirects"
run = "lychee -v ."

[tasks.format-md]
description = "Format markdown files"
run = "rumdl check --fix"

[tasks.format-sh]
description = "Format shell scripts"
run = "shfmt -i 2 -w scripts/*.sh"

[tasks."ccusage:daily"]
description = "Show ccusage daily report (last 2 weeks) in a Quick Look popup"
run = 'scripts/ccusage_popup.sh daily'

[tasks."ccusage:weekly"]
description = "Show ccusage weekly report (last 2 months) in a Quick Look popup"
run = 'scripts/ccusage_popup.sh weekly'

[tasks."skills:list"]
description = "List gist-sourced skills declared in gistSkills.json"
run = "jq -r 'keys[]' gistSkills.json"

[tasks."skills:sync"]
description = "Vendor gist-sourced skills into .claude/skills/ (gitignored like APM deps; catalog is SoT)"
usage = 'arg "[name]" help="Skill from gistSkills.json to sync; omit to sync all"'
# ${usage_name:-} is intentionally unquoted: no arg must expand to zero args (sync all),
# not an empty-string arg, which the script would reject as an invalid name.
run = "scripts/sync_gist_skills.sh ${usage_name:-}"

[tasks."skills:push"]
description = "Push local edits to a gist-sourced SKILL.md back to its gist (external write; needs gh auth)"
usage = 'arg "<name>" help="Skill from gistSkills.json to push back to its gist"'
# $usage_name is a single required arg (usage errors if omitted); quote it since a skill
# name is one token, unlike the deliberately unquoted optional arg in skills:sync.
run = 'scripts/push_gist_skill.sh "$usage_name"'

[tasks."skills:remove"]
description = "Uninstall apm skill(s) from apm.yml, apm.lock.yaml, and .claude/skills/"
usage = 'arg "<pkg>" var=#true help="apm package path(s) to remove, e.g. blader/humanizer"'
# No cleanup step: the singular `target: claude` pin (not plural `targets:`) confines
# `apm uninstall` to .claude/skills/, so it never leaves a stray .agents/skills/ to prune.
# Keep the pin singular and don't re-add `rm -rf`.
# $usage_pkg is unquoted on purpose: a variadic arg arrives space-joined and must
# word-split into one positional per package (apm paths have no spaces).
run = "apm uninstall $usage_pkg"
