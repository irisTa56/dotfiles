[tools]
gitleaks = "latest"
lychee = "latest"
rumdl = "latest"
shellcheck = "latest"
shfmt = "latest"
"npm:skills" = "latest"

[env]
HOMEBREW_BUNDLE_DUMP_NO_VSCODE = "1"

[hooks]
postinstall = '''
hook="$(git rev-parse --git-path hooks/pre-commit)"
test -f "$hook" || { printf '#!/bin/sh\nmise run pre-commit\n' > "$hook" && chmod +x "$hook"; }
'''

[tasks.pre-commit]
description = "Run pre-commit checks"
run = """
gitleaks protect -v --staged
lychee .
rumdl check
shellcheck scripts/*.sh
shfmt -i 2 -d scripts/*.sh
"""

[tasks."setup:dotfiles"]
description = "Run initial dotfiles setup (dircolors, gitignore, zprofile)"
run = "scripts/setup_dotfiles.sh"

[tasks.link-check]
description = "Check if links are valid, showing redirects"
run = "lychee -v ."

[tasks.format-md]
description = "Format markdown files"
run = "rumdl check --fix"

[tasks.format-sh]
description = "Format shell scripts"
run = "shfmt -i 2 -w scripts/*.sh"

[tasks."skills:diff"]
description = "Diff installed skills against skills-lock.json (locally-tracked skills excluded)"
shell = "bash -c"
quiet = true
run = """
comm -3 \
  <(jq -r '.skills | keys[]' skills-lock.json | sort) \
  <(ls .agents/skills \
      | grep -vxFf <(sed -nE 's|^!/\\.agents/skills/([^/]+)/$|\\1|p' .gitignore) \
      | sort) \
  | awk -F'\\t' 'NF==1{print "missing: "$1} NF==2{print "drift:   "$2}'
"""

[tasks."mcp:dump"]
description = "Dump Claude Desktop's mcpServers (SoT) into mcpServers.json"
run = "scripts/mcp_dump.sh"

[tasks."mcp:diff"]
description = "Show servers missing from / extra in each client vs mcpServers.json"
run = "scripts/mcp_diff.sh"

[tasks."mcp:claude"]
description = "Install <name> from mcpServers.json into Claude Code user scope (~/.claude.json)"
usage = 'arg "<name>" help="Server name (catalog: mcpServers.json)"'
shell = "bash -c"
run = '''
claude mcp add-json -s user "$usage_name" "$(envsubst < mcpServers.json | jq --arg n "$usage_name" '.[$n]')"
'''

[tasks."mcp:vscode"]
description = "Install <name> from mcpServers.json into VS Code user profile"
usage = 'arg "<name>" help="Server name (catalog: mcpServers.json)"'
shell = "bash -c"
run = '''
code --add-mcp "$(envsubst < mcpServers.json | jq --arg n "$usage_name" '.[$n] + {name:$n}')"
'''
